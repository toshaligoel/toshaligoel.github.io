  <!DOCTYPE html>
<html>
<title>W3.CSS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
<style>
.mySlides {display:none}
</style>
<body>

<p></p><br>
<div class="w3-content" style="max-width:800px">
  <img class="mySlides" src="img/palm_trees copy.jpg" style="width:100%">
  <img class="mySlides" src="img/golden_gate_fire copy.jpg" style="width:100%">
  <img class="mySlides" src="img/justice copy.jpg" style="width:100%">
  <img class="mySlides" src="img/pro_choice copy.jpg" style="width:100%">
  <img class="mySlides" src="img/domestic_violence copy.jpg" style="width:100%">
  <img class="mySlides" src="img/upside_down copy.jpg" style="width:100%">
  <img class="mySlides" src="img/hands-fever-dream copy.jpg" style="width:100%">
  <img class="mySlides" src="img/climate_change copy.jpg" style="width:100%">

</div>

<div class="w3-center">
  <div class="w3-section">
    <button class="w3-button move-button" onclick="plusDivs(-1)"><img src="img/left-arrow.png" width=70px padding=100px></button>
    <button class="w3-button move-button" onclick="plusDivs(1)"><img src="img/right-arrow.png" width=70px padding=100px></button>
  </div>
  <button onclick="currentDiv(1)"><img class="slider-button" src="img/palm_trees copy.jpg" width=20px></button>
  <button onclick="currentDiv(2)"><img class="slider-button" src="img/golden_gate_fire copy.jpg" width=20px></button>
  <button onclick="currentDiv(3)"><img class="slider-button" src="img/justice copy.jpg" width=50px></button>
  <button onclick="currentDiv(4)"><img class="slider-button" src="img/pro_choice copy.jpg" width=50px></button>
  <button onclick="currentDiv(5)"><img class="slider-button" src="img/domestic_violence copy.jpg" width=50px></button>
  <button onclick="currentDiv(5)"><img class="slider-button" src="img/upside_down copy.jpg" width=50px></button>
  <button onclick="currentDiv(5)"><img class="slider-button" src="img/hands-fever-dream copy.jpg" width=50px></button>
  <button onclick="currentDiv(5)"><img class="slider-button" src="img/climate_change copy.jpg" width=50px></button>

</div>

<script>
var slideIndex = 1;
showDivs(slideIndex);

function plusDivs(n) {
  showDivs(slideIndex += n);
}

function currentDiv(n) {
  showDivs(slideIndex = n);
}

function showDivs(n) {
  var i;
  var x = document.getElementsByClassName("mySlides");
  var dots = document.getElementsByClassName("demo");
  if (n > x.length) {slideIndex = 1}
  if (n < 1) {slideIndex = x.length}
  for (i = 0; i < x.length; i++) {
    x[i].style.display = "none";
  }
  for (i = 0; i < dots.length; i++) {
    dots[i].className = dots[i].className.replace(" w3-red", "");
  }
  x[slideIndex-1].style.display = "block";
  dots[slideIndex-1].className += " w3-red";
}
</script>

<div class='return'>
  <p>
    <p>
      <p>
        <p>
  <p>
  <br>
<button class="return-button" type="button" onclick="window.location.href='index.html';">Return to main page</button>
</div>
</body>
</html>
